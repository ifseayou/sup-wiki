<svg xmlns="http://www.w3.org/2000/svg" width="660" height="390" viewBox="0 0 660 390">
  <!-- Background -->
  <rect width="660" height="390" fill="#FAF7F2" rx="8"/>
  <!-- Title -->
  <text x="330" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#2E2118" text-anchor="middle">桨叶方向：凸面应该朝向哪里？</text>

  <!-- Divider -->
  <line x1="330" y1="55" x2="330" y2="310" stroke="#EDE5D8" stroke-width="2"/>

  <!-- LEFT: WRONG direction -->
  <text x="165" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#C0392B" text-anchor="middle">❌ 错误：凸面朝前</text>

  <!-- Wrong paddle cross section -->
  <!-- Direction arrow: moving right -->
  <text x="90" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7A6145" text-anchor="middle">划行方向</text>
  <line x1="50" y1="118" x2="238" y2="118" stroke="#7A6145" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="238,114 250,118 238,122" fill="#7A6145"/>

  <!-- Blade cross-section (wrong: convex faces direction of travel = right) -->
  <g transform="translate(130, 130)">
    <!-- Shaft -->
    <line x1="0" y1="-20" x2="0" y2="80" stroke="#2E2118" stroke-width="4"/>
    <!-- Blade cross-section (crescent shape, convex on right = forward) -->
    <path d="M-8,0 Q20,18 -8,38 Q-22,28 -20,18 Q-22,8 -8,0Z" fill="#C4A882" stroke="#7A6145" stroke-width="2"/>
    <!-- Convex face indicator -->
    <text x="25" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#C0392B">凸面</text>
    <line x1="22" y1="19" x2="8" y2="19" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arrowred)"/>
    <!-- Water flow arrows (turbulent - wrong) -->
    <path d="M30,5 Q45,12 38,20 Q45,28 30,35" stroke="#4A90D9" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
    <text x="35" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#C0392B">水流紊乱</text>
  </g>

  <!-- X mark -->
  <circle cx="165" cy="240" r="28" fill="#FFE8E8" stroke="#C0392B" stroke-width="2"/>
  <line x1="148" y1="223" x2="182" y2="257" stroke="#C0392B" stroke-width="3"/>
  <line x1="182" y1="223" x2="148" y2="257" stroke="#C0392B" stroke-width="3"/>

  <text x="165" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#C0392B" text-anchor="middle">推水效率低</text>
  <text x="165" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#C0392B" text-anchor="middle">产生阻力</text>

  <!-- RIGHT: CORRECT direction -->
  <text x="495" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0E6655" text-anchor="middle">✅ 正确：凸面朝后</text>

  <!-- Correct paddle cross section -->
  <!-- Direction arrow -->
  <text x="420" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7A6145" text-anchor="middle">划行方向</text>
  <line x1="380" y1="118" x2="568" y2="118" stroke="#7A6145" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="568,114 580,118 568,122" fill="#7A6145"/>

  <!-- Blade cross-section (correct: convex faces backward = left) -->
  <g transform="translate(495, 130)">
    <!-- Shaft -->
    <line x1="0" y1="-20" x2="0" y2="80" stroke="#2E2118" stroke-width="4"/>
    <!-- Blade cross-section (crescent, convex on left = backward) -->
    <path d="M8,0 Q-20,18 8,38 Q22,28 20,18 Q22,8 8,0Z" fill="#C4A882" stroke="#7A6145" stroke-width="2"/>
    <!-- Convex face indicator -->
    <text x="-55" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#0E6655">凸面</text>
    <line x1="-22" y1="19" x2="-8" y2="19" stroke="#0E6655" stroke-width="1.5" marker-end="url(#arrowgreen)"/>
    <!-- Water flow arrows (smooth - correct) -->
    <path d="M20,8 L35,18 L20,28" stroke="#4A90D9" stroke-width="1.5" fill="none"/>
    <path d="M20,2 L40,18 L20,34" stroke="#4A90D9" stroke-width="1" fill="none"/>
    <text x="28" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#0E6655">水流顺滑</text>
  </g>

  <!-- Check mark -->
  <circle cx="495" cy="240" r="28" fill="#E8F8F5" stroke="#0E6655" stroke-width="2"/>
  <polyline points="480,240 492,252 516,228" stroke="#0E6655" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="495" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0E6655" text-anchor="middle">推水高效</text>
  <text x="495" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0E6655" text-anchor="middle">前进速度快</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowred" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#C0392B"/>
    </marker>
    <marker id="arrowgreen" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0E6655"/>
    </marker>
  </defs>

  <!-- Bottom explanation -->
  <rect x="50" y="330" width="560" height="48" rx="8" fill="#2E2118"/>
  <text x="330" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FAF7F2" text-anchor="middle">记忆口诀：桨叶入水面朝前，凸面朝向自己身后</text>
  <text x="330" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C4A882" text-anchor="middle">叶片向后倾斜设计，配合正确方向，可提升 10–15% 划行效率</text>
</svg>