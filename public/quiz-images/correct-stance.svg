<svg xmlns="http://www.w3.org/2000/svg" width="660" height="430" viewBox="0 0 660 430">
  <!-- Background -->
  <rect width="660" height="430" fill="#FAF7F2" rx="8"/>
  <!-- Title -->
  <text x="330" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#2E2118" text-anchor="middle">站在桨板上的正确站姿</text>

  <!-- Divider -->
  <line x1="330" y1="55" x2="330" y2="390" stroke="#EDE5D8" stroke-width="2"/>

  <!-- LEFT: Top view (overhead) -->
  <text x="165" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#2E2118" text-anchor="middle">俯视图</text>

  <!-- Board outline (top view) -->
  <path d="M165 90 Q210 94 218 120 L218 245 Q210 260 165 263 Q120 260 112 245 L112 120 Q120 94 165 90Z" fill="#C4A882" stroke="#7A6145" stroke-width="2.5"/>
  <!-- Center handle -->
  <rect x="157" y="170" width="16" height="8" rx="3" fill="#7A6145"/>
  <text x="165" y="177" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#FAF7F2" text-anchor="middle">提手</text>

  <!-- Nose label -->
  <text x="165" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FAF7F2" text-anchor="middle">板头</text>
  <!-- Tail label -->
  <text x="165" y="253" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FAF7F2" text-anchor="middle">板尾</text>

  <!-- Foot positions (top view - two rectangles) -->
  <rect x="135" y="158" width="20" height="28" rx="4" fill="#2E2118" opacity="0.8"/>
  <rect x="175" y="158" width="20" height="28" rx="4" fill="#2E2118" opacity="0.8"/>
  <text x="125" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#FAF7F2">左脚</text>
  <text x="198" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#FAF7F2">右脚</text>

  <!-- Shoulder width indicator -->
  <line x1="112" y1="140" x2="218" y2="140" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="70" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#C0392B">←</text>
  <text x="222" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#C0392B">→</text>

  <!-- Labels below -->
  <rect x="50" y="285" width="230" height="90" rx="6" fill="#EDE5D8" stroke="#C4A882" stroke-width="1"/>
  <text x="165" y="306" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2E2118" text-anchor="middle">俯视要点</text>
  <text x="70" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2E2118">✅ 两脚平行，与肩同宽</text>
  <text x="70" y="346" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2E2118">✅ 站在提手两侧（中心）</text>
  <text x="70" y="366" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2E2118">✅ 脚趾朝向板头方向</text>

  <!-- RIGHT: Side view -->
  <text x="495" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#2E2118" text-anchor="middle">侧视图</text>

  <!-- Water line -->
  <line x1="370" y1="305" x2="640" y2="305" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="378" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4A90D9">水面</text>

  <!-- Board side profile -->
  <path d="M395 295 Q430 290 510 288 Q560 290 600 298 Q610 302 605 305 Q560 308 510 306 Q430 306 400 308 Q390 304 395 295Z" fill="#C4A882" stroke="#7A6145" stroke-width="2"/>

  <!-- Person (side view, correct stance) -->
  <!-- Feet on board -->
  <rect x="472" y="282" width="55" height="8" rx="2" fill="#2E2118" opacity="0.7"/>
  <!-- Legs slightly bent -->
  <line x1="488" y1="282" x2="490" y2="240" stroke="#2E2118" stroke-width="4"/>
  <line x1="517" y1="282" x2="515" y2="240" stroke="#2E2118" stroke-width="4"/>
  <!-- Knee bend points -->
  <ellipse cx="490" cy="258" rx="5" ry="5" fill="#C4A882" stroke="#2E2118" stroke-width="1.5"/>
  <ellipse cx="515" cy="258" rx="5" ry="5" fill="#C4A882" stroke="#2E2118" stroke-width="1.5"/>
  <!-- Body (straight back) -->
  <line x1="502" y1="240" x2="500" y2="192" stroke="#2E2118" stroke-width="5"/>
  <!-- Arms holding paddle -->
  <line x1="500" y1="210" x2="530" y2="196" stroke="#2E2118" stroke-width="3"/>
  <line x1="500" y1="222" x2="468" y2="240" stroke="#2E2118" stroke-width="3"/>
  <!-- Paddle shaft -->
  <line x1="540" y1="165" x2="460" y2="280" stroke="#7A6145" stroke-width="3"/>
  <!-- Paddle blade -->
  <path d="M452 274 Q463 265 470 273 Q472 284 465 288 Q454 288 452 280Z" fill="#C4A882" stroke="#7A6145" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="500" cy="180" r="14" fill="#FAF7F2" stroke="#2E2118" stroke-width="2.5"/>
  <!-- Eyes looking forward -->
  <circle cx="506" cy="178" r="2" fill="#2E2118"/>

  <!-- Annotation arrows and labels -->
  <!-- Knee bend -->
  <line x1="514" y1="258" x2="552" y2="245" stroke="#C0392B" stroke-width="1.5"/>
  <text x="555" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0E6655">膝盖微弯</text>
  <!-- Straight back -->
  <line x1="497" y1="216" x2="558" y2="205" stroke="#C0392B" stroke-width="1.5"/>
  <text x="560" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0E6655">背部挺直</text>
  <!-- Eyes forward -->
  <line x1="508" y1="178" x2="560" y2="168" stroke="#C0392B" stroke-width="1.5"/>
  <text x="562" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0E6655">目视前方</text>
  <!-- Weight slight forward -->
  <line x1="499" y1="192" x2="440" y2="192" stroke="#C0392B" stroke-width="1.5"/>
  <text x="375" y="196" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0E6655">重心微前</text>

  <!-- Side view annotations box -->
  <rect x="360" y="330" width="270" height="80" rx="6" fill="#EDE5D8" stroke="#C4A882" stroke-width="1"/>
  <text x="495" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2E2118" text-anchor="middle">侧视要点</text>
  <text x="376" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2E2118">✅ 膝盖微弯，吸收水面波动</text>
  <text x="376" y="392" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2E2118">✅ 眼睛看前方水面，非脚下</text>
</svg>