<svg xmlns="http://www.w3.org/2000/svg" width="660" height="430" viewBox="0 0 660 430">
  <!-- Background -->
  <rect width="660" height="430" fill="#FAF7F2" rx="8"/>
  <!-- Title -->
  <text x="330" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#2E2118" text-anchor="middle">SUP 桨的正确长度选择</text>

  <!-- Main figure: person standing with paddle -->
  <!-- Water line -->
  <line x1="60" y1="310" x2="320" y2="310" stroke="#4A90D9" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="190" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#4A90D9" text-anchor="middle">水面</text>

  <!-- Ground/board under feet -->
  <rect x="100" y="308" width="140" height="8" rx="3" fill="#C4A882" stroke="#7A6145" stroke-width="1.5"/>

  <!-- Person silhouette (side view) -->
  <!-- Feet -->
  <rect x="128" y="300" width="18" height="8" rx="2" fill="#2E2118"/>
  <rect x="155" y="300" width="18" height="8" rx="2" fill="#2E2118"/>
  <!-- Legs -->
  <line x1="140" y1="265" x2="137" y2="300" stroke="#2E2118" stroke-width="4"/>
  <line x1="162" y1="265" x2="165" y2="300" stroke="#2E2118" stroke-width="4"/>
  <!-- Body -->
  <line x1="151" y1="200" x2="151" y2="265" stroke="#2E2118" stroke-width="5"/>
  <!-- Head -->
  <circle cx="151" cy="188" r="14" fill="#FAF7F2" stroke="#2E2118" stroke-width="2.5"/>
  <!-- Raised arm -->
  <line x1="151" y1="215" x2="168" y2="175" stroke="#2E2118" stroke-width="4"/>
  <line x1="151" y1="215" x2="140" y2="250" stroke="#2E2118" stroke-width="4"/>
  <!-- Wrist (raised arm end) -->
  <circle cx="168" cy="172" r="5" fill="#C4A882" stroke="#2E2118" stroke-width="1.5"/>

  <!-- Paddle - full height -->
  <!-- Blade -->
  <path d="M180 100 Q188 96 192 110 L190 135 Q186 140 180 138 Q174 136 172 128 L172 110 Q175 98 180 100Z" fill="#7A6145" stroke="#2E2118" stroke-width="1.5"/>
  <!-- Shaft -->
  <line x1="181" y1="136" x2="181" y2="308" stroke="#2E2118" stroke-width="3"/>
  <!-- Handle -->
  <rect x="174" y="96" width="14" height="8" rx="3" fill="#2E2118"/>

  <!-- Height measurement arrow -->
  <!-- Total height line -->
  <line x1="220" y1="100" x2="220" y2="308" stroke="#C4A882" stroke-width="1.5"/>
  <line x1="213" y1="100" x2="227" y2="100" stroke="#C4A882" stroke-width="1.5"/>
  <line x1="213" y1="308" x2="227" y2="308" stroke="#C4A882" stroke-width="1.5"/>
  <!-- Body height arrow -->
  <line x1="240" y1="175" x2="240" y2="308" stroke="#0E6655" stroke-width="2"/>
  <line x1="233" y1="175" x2="247" y2="175" stroke="#0E6655" stroke-width="2"/>
  <line x1="233" y1="308" x2="247" y2="308" stroke="#0E6655" stroke-width="2"/>
  <text x="270" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0E6655">身高</text>
  <!-- Extra length arrow -->
  <line x1="240" y1="102" x2="240" y2="175" stroke="#C0392B" stroke-width="2"/>
  <line x1="233" y1="102" x2="247" y2="102" stroke="#C0392B" stroke-width="2"/>
  <line x1="233" y1="175" x2="247" y2="175" stroke="#C0392B" stroke-width="2"/>
  <text x="256" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#C0392B">+20–25cm</text>

  <!-- Formula box -->
  <rect x="50" y="340" width="290" height="72" rx="8" fill="#2E2118"/>
  <text x="195" y="364" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FAF7F2" text-anchor="middle">标准桨长公式</text>
  <text x="195" y="386" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#C4A882" text-anchor="middle">身高 + 20–25 cm</text>
  <text x="195" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#EDE5D8" text-anchor="middle">手腕上方约一掌宽的位置</text>

  <!-- Usage variants -->
  <rect x="360" y="100" width="270" height="270" rx="8" fill="#EDE5D8" stroke="#C4A882" stroke-width="1.5"/>
  <text x="495" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#2E2118" text-anchor="middle">不同用途的桨长调整</text>
  <line x1="380" y1="130" x2="610" y2="130" stroke="#C4A882" stroke-width="1"/>

  <!-- Race -->
  <rect x="375" y="140" width="240" height="52" rx="5" fill="#FAF7F2" stroke="#EDE5D8" stroke-width="1"/>
  <text x="391" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="13">🏁</text>
  <text x="415" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#2E2118">竞速 / 长距离</text>
  <text x="415" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#C0392B">身高 + 25–30 cm（更长）</text>

  <!-- Surf -->
  <rect x="375" y="202" width="240" height="52" rx="5" fill="#FAF7F2" stroke="#EDE5D8" stroke-width="1"/>
  <text x="391" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="13">🌊</text>
  <text x="415" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#2E2118">冲浪 / 浪区</text>
  <text x="415" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0E6655">身高 + 15–20 cm（更短）</text>

  <!-- Yoga -->
  <rect x="375" y="264" width="240" height="52" rx="5" fill="#FAF7F2" stroke="#EDE5D8" stroke-width="1"/>
  <text x="391" y="286" font-family="system-ui, -apple-system, sans-serif" font-size="13">🧘</text>
  <text x="415" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#2E2118">瑜伽 / 休闲</text>
  <text x="415" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7A6145">身高 + 20 cm（标准）</text>

  <!-- Tip -->
  <rect x="360" y="385" width="270" height="35" rx="5" fill="#C4A882"/>
  <text x="495" y="406" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FAF7F2" text-anchor="middle">可调节桨适合初学者，长度灵活</text>
</svg>