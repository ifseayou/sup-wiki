<svg xmlns="http://www.w3.org/2000/svg" width="660" height="420" viewBox="0 0 660 420">
  <!-- Background -->
  <rect width="660" height="420" fill="#FAF7F2" rx="8"/>
  <!-- Title -->
  <text x="330" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#2E2118" text-anchor="middle">Drop-Stitch 技术原理</text>

  <!-- ===== Main center diagram: cross-section ===== -->
  <text x="330" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#7A6145" text-anchor="middle">充气桨板横截面结构图</text>

  <!-- Board cross-section (wide, flat) -->
  <!-- Top PVC layer -->
  <rect x="80" y="80" width="500" height="24" rx="4" fill="#7A6145" stroke="#2E2118" stroke-width="2"/>
  <text x="330" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FAF7F2" text-anchor="middle">上层 PVC 面板（高强度 PVC 材料）</text>

  <!-- Drop-stitch threads (vertical lines between layers) -->
  <g id="threads">
    <!-- Air chamber background -->
    <rect x="80" y="104" width="500" height="90" fill="#D6EAF8" stroke="none"/>
    <!-- Individual drop-stitch threads (dense vertical lines) -->
    <line x1="95" y1="104" x2="95" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="110" y1="104" x2="110" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="125" y1="104" x2="125" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="140" y1="104" x2="140" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="155" y1="104" x2="155" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="170" y1="104" x2="170" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="185" y1="104" x2="185" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="200" y1="104" x2="200" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="215" y1="104" x2="215" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="230" y1="104" x2="230" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="245" y1="104" x2="245" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="260" y1="104" x2="260" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="275" y1="104" x2="275" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="290" y1="104" x2="290" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="305" y1="104" x2="305" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="320" y1="104" x2="320" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="335" y1="104" x2="335" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="350" y1="104" x2="350" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="365" y1="104" x2="365" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="380" y1="104" x2="380" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="395" y1="104" x2="395" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="410" y1="104" x2="410" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="425" y1="104" x2="425" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="440" y1="104" x2="440" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="455" y1="104" x2="455" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="470" y1="104" x2="470" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="485" y1="104" x2="485" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="500" y1="104" x2="500" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="515" y1="104" x2="515" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="530" y1="104" x2="530" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="545" y1="104" x2="545" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="560" y1="104" x2="560" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
    <line x1="575" y1="104" x2="575" y2="194" stroke="#4A90D9" stroke-width="1.2"/>
  </g>

  <!-- Thread label with pointer -->
  <line x1="320" y1="149" x2="260" y2="145" stroke="#1A5276" stroke-width="1.5"/>
  <circle cx="320" cy="149" r="4" fill="#1A5276"/>
  <text x="256" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1A5276" text-anchor="end">Drop-Stitch</text>
  <text x="256" y="154" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1A5276" text-anchor="end">细线（数千根）</text>

  <!-- Air pressure label -->
  <text x="490" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1A5276">气压</text>
  <text x="490" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1A5276">15 PSI</text>

  <!-- Bottom PVC layer -->
  <rect x="80" y="194" width="500" height="24" rx="4" fill="#7A6145" stroke="#2E2118" stroke-width="2"/>
  <text x="330" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FAF7F2" text-anchor="middle">下层 PVC 面板（高强度 PVC 材料）</text>

  <!-- How it works arrow and label -->
  <path d="M330 220 L330 245" stroke="#2E2118" stroke-width="2" marker-end="url(#blackarrow)"/>
  <text x="330" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2E2118" text-anchor="middle">充气后细线绷紧 → 板面平整坚硬 → 接近硬板刚性</text>

  <!-- Comparison: without vs with drop-stitch -->
  <!-- Without -->
  <g transform="translate(50, 282)">
    <text x="115" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#C0392B" text-anchor="middle">❌ 无 Drop-Stitch 充气</text>
    <!-- Balloon-like shape -->
    <ellipse cx="115" cy="72" rx="90" ry="48" fill="#FFB3B3" stroke="#C0392B" stroke-width="2"/>
    <text x="115" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C0392B" text-anchor="middle">圆鼓气囊形</text>
    <text x="115" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C0392B" text-anchor="middle">无法承重站立</text>
  </g>

  <!-- With -->
  <g transform="translate(390, 282)">
    <text x="115" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#0E6655" text-anchor="middle">✅ 有 Drop-Stitch 充气</text>
    <!-- Flat rectangular board shape -->
    <rect x="25" y="44" width="180" height="56" rx="6" fill="#B3F0D8" stroke="#0E6655" stroke-width="2"/>
    <!-- Internal lines suggesting rigidity -->
    <line x1="55" y1="44" x2="55" y2="100" stroke="#0E6655" stroke-width="0.8" opacity="0.5"/>
    <line x1="85" y1="44" x2="85" y2="100" stroke="#0E6655" stroke-width="0.8" opacity="0.5"/>
    <line x1="115" y1="44" x2="115" y2="100" stroke="#0E6655" stroke-width="0.8" opacity="0.5"/>
    <line x1="145" y1="44" x2="145" y2="100" stroke="#0E6655" stroke-width="0.8" opacity="0.5"/>
    <line x1="175" y1="44" x2="175" y2="100" stroke="#0E6655" stroke-width="0.8" opacity="0.5"/>
    <text x="115" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0E6655" text-anchor="middle">平整坚硬板型</text>
    <text x="115" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0E6655" text-anchor="middle">可正常站立使用</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="blackarrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2E2118"/>
    </marker>
  </defs>
</svg>