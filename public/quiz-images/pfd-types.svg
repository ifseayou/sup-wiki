<svg xmlns="http://www.w3.org/2000/svg" width="660" height="420" viewBox="0 0 660 420">
  <!-- Background -->
  <rect width="660" height="420" fill="#FAF7F2" rx="8"/>
  <!-- Title -->
  <text x="330" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#2E2118" text-anchor="middle">PFD（个人漂浮设备）类型对比</text>

  <!-- Divider -->
  <line x1="330" y1="55" x2="330" y2="345" stroke="#EDE5D8" stroke-width="2"/>

  <!-- LEFT: Vest-type PFD -->
  <text x="165" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#2E2118" text-anchor="middle">背心式 PFD</text>
  <text x="165" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7A6145" text-anchor="middle">Type III Vest</text>

  <!-- Vest illustration -->
  <g transform="translate(90, 100)">
    <!-- Vest body -->
    <path d="M75 10 Q100 5 115 20 L120 80 Q110 100 95 105 L95 150 L55 150 L55 105 Q40 100 30 80 L35 20 Q50 5 75 10Z" fill="#FF6B35" stroke="#C0392B" stroke-width="2.5" opacity="0.85"/>
    <!-- Foam panels -->
    <rect x="40" y="25" width="25" height="70" rx="4" fill="#FF8C5A" opacity="0.6"/>
    <rect x="85" y="25" width="25" height="70" rx="4" fill="#FF8C5A" opacity="0.6"/>
    <!-- Buckle/zipper -->
    <line x1="75" y1="15" x2="75" y2="145" stroke="#2E2118" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- Shoulder straps -->
    <path d="M35 20 Q30 8 40 2 Q50 -2 55 8" stroke="#C0392B" stroke-width="2" fill="none"/>
    <path d="M115 20 Q120 8 110 2 Q100 -2 95 8" stroke="#C0392B" stroke-width="2" fill="none"/>
    <!-- Label -->
    <text x="75" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7A6145" text-anchor="middle">充满泡沫填充</text>
  </g>

  <!-- Vest features -->
  <rect x="35" y="295" width="275" height="112" rx="6" fill="#EDE5D8" stroke="#C4A882" stroke-width="1.5"/>
  <text x="172" y="316" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2E2118" text-anchor="middle">背心式特点</text>
  <text x="50" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0E6655">✅ 无需操作，始终提供浮力</text>
  <text x="50" y="354" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0E6655">✅ 推荐初学者、儿童佩戴</text>
  <text x="50" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2E2118">⚠ 穿着较厚，影响划桨动作</text>
  <text x="50" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2E2118">⚠ 体积大，不便于运动</text>

  <!-- RIGHT: Inflatable PFD -->
  <text x="495" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#2E2118" text-anchor="middle">充气式 PFD</text>
  <text x="495" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7A6145" text-anchor="middle">Inflatable PFD</text>

  <!-- Inflatable PFD - deflated state -->
  <g transform="translate(380, 90)">
    <!-- Deflated pack (small, compact) -->
    <text x="115" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7A6145" text-anchor="middle">平时（折叠收纳状态）</text>
    <rect x="85" y="28" width="60" height="50" rx="6" fill="#4A90D9" stroke="#1A5276" stroke-width="2"/>
    <text x="115" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#FAF7F2" text-anchor="middle">折叠袋</text>
    <!-- Pull cord -->
    <line x1="115" y1="78" x2="115" y2="98" stroke="#C0392B" stroke-width="2.5"/>
    <circle cx="115" cy="102" r="6" fill="#C0392B"/>
    <text x="140" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#C0392B">拉绳</text>

    <!-- Arrow -->
    <text x="115" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle">↓</text>
    <text x="115" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7A6145" text-anchor="middle">拉动充气绳</text>

    <!-- Inflated state -->
    <text x="115" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7A6145" text-anchor="middle">充气后（提供浮力）</text>
    <!-- Inflated collar shape -->
    <path d="M68 175 Q75 168 115 170 Q155 168 162 175 L165 200 Q155 218 115 220 Q75 218 65 200 Z" fill="#4A90D9" stroke="#1A5276" stroke-width="2" opacity="0.85"/>
    <text x="115" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FAF7F2" text-anchor="middle">充气气囊</text>
  </g>

  <!-- Inflatable features -->
  <rect x="350" y="295" width="275" height="112" rx="6" fill="#EDE5D8" stroke="#C4A882" stroke-width="1.5"/>
  <text x="487" y="316" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2E2118" text-anchor="middle">充气式特点</text>
  <text x="365" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0E6655">✅ 轻薄，不影响划行动作</text>
  <text x="365" y="354" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0E6655">✅ 腰包款佩戴舒适，长距离适用</text>
  <text x="365" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C0392B">⚠ 落水后需手动拉绳充气</text>
  <text x="365" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C0392B">⚠ 失去意识时无法自动保护</text>

  <!-- Bottom notice -->
  <rect x="30" y="363" width="600" height="45" rx="6" fill="#2E2118"/>
  <text x="330" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FAF7F2" text-anchor="middle">国内开放水域规定：在水上运动时须携带或穿戴 PFD</text>
  <text x="330" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C4A882" text-anchor="middle">初学者强烈建议穿戴背心式；进阶运动员可选充气式腰包款</text>
</svg>