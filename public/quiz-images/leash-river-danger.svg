<svg xmlns="http://www.w3.org/2000/svg" width="660" height="430" viewBox="0 0 660 430">
  <!-- Background -->
  <rect width="660" height="430" fill="#FAF7F2" rx="8"/>
  <!-- Title -->
  <text x="330" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#2E2118" text-anchor="middle">急流河流中踝绳的危险</text>

  <!-- River (top view) - blue winding shape -->
  <path d="M60 70 Q120 80 160 120 Q200 160 240 140 Q280 120 320 150 Q360 180 400 160 Q440 140 490 170 Q540 200 600 180" stroke="#4A90D9" stroke-width="80" fill="none" stroke-linecap="round" opacity="0.25"/>
  <!-- River edges -->
  <path d="M60 35 Q120 45 160 85 Q200 125 240 105 Q280 85 320 115 Q360 145 400 125 Q440 105 490 135 Q540 165 600 145" stroke="#4A90D9" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <path d="M60 105 Q120 115 160 155 Q200 195 240 175 Q280 155 320 185 Q360 215 400 195 Q440 175 490 205 Q540 235 600 215" stroke="#4A90D9" stroke-width="2" fill="none" stroke-dasharray="6,3"/>

  <!-- River label -->
  <text x="330" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4A90D9" text-anchor="middle">急流方向 →</text>

  <!-- Rocks in river -->
  <ellipse cx="210" cy="145" rx="20" ry="13" fill="#7A6145" stroke="#2E2118" stroke-width="1.5"/>
  <text x="210" y="149" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#FAF7F2" text-anchor="middle">岩石</text>

  <ellipse cx="380" cy="155" rx="18" ry="11" fill="#7A6145" stroke="#2E2118" stroke-width="1.5"/>
  <text x="380" y="159" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#FAF7F2" text-anchor="middle">岩石</text>

  <ellipse cx="500" cy="165" rx="15" ry="10" fill="#7A6145" stroke="#2E2118" stroke-width="1.5"/>
  <text x="500" y="169" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#FAF7F2" text-anchor="middle">石</text>

  <!-- Person in water (simple) -->
  <circle cx="270" cy="148" r="10" fill="#FAF7F2" stroke="#2E2118" stroke-width="2"/>
  <line x1="270" y1="158" x2="265" y2="172" stroke="#2E2118" stroke-width="2"/>
  <line x1="270" y1="158" x2="275" y2="172" stroke="#2E2118" stroke-width="2"/>
  <line x1="265" y1="163" x2="258" y2="158" stroke="#2E2118" stroke-width="2"/>
  <line x1="275" y1="163" x2="282" y2="158" stroke="#2E2118" stroke-width="2"/>

  <!-- Leash wrapping around rock - red dashed -->
  <path d="M265 172 Q240 165 215 148" stroke="#C0392B" stroke-width="2.5" fill="none" stroke-dasharray="6,3"/>
  <!-- Wrap indicator at rock -->
  <path d="M205 138 Q215 130 225 138 Q230 148 220 155 Q210 160 205 148Z" stroke="#C0392B" stroke-width="2" fill="none" stroke-dasharray="3,2"/>
  <text x="195" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#C0392B" text-anchor="middle">绳缠住！</text>

  <!-- Big warning sign -->
  <polygon points="330,195 360,245 300,245" fill="#C0392B" stroke="#8B0000" stroke-width="2"/>
  <text x="330" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#FAF7F2" text-anchor="middle">!</text>

  <!-- Danger explanation -->
  <rect x="40" y="258" width="580" height="72" rx="6" fill="#FFE8E8" stroke="#C0392B" stroke-width="2"/>
  <text x="330" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#C0392B" text-anchor="middle">❌ 急流中禁用普通踝绳</text>
  <text x="330" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2E2118" text-anchor="middle">踝绳可能卡住水中岩石，将人拖拽固定在水流中，</text>
  <text x="330" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2E2118" text-anchor="middle">导致无法自行脱身，极度危险！</text>

  <!-- Correct approach -->
  <rect x="40" y="342" width="580" height="72" rx="6" fill="#E8F8F5" stroke="#0E6655" stroke-width="2"/>
  <text x="330" y="364" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0E6655" text-anchor="middle">✅ 正确做法</text>
  <text x="330" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2E2118" text-anchor="middle">急流中使用专业白水腰包式踝绳（White Water Leash）</text>
  <text x="330" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2E2118" text-anchor="middle">配备快速解脱扣，危急时一拉即断开，或直接不使用踝绳</text>
</svg>