<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <!-- Background -->
  <rect width="660" height="400" fill="#FAF7F2" rx="8"/>
  <!-- Title -->
  <text x="330" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#2E2118" text-anchor="middle">踝绳长度选择指南</text>

  <!-- Key rule box -->
  <rect x="60" y="52" width="540" height="42" rx="6" fill="#2E2118"/>
  <text x="330" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FAF7F2" text-anchor="middle">核心原则：踝绳长度 ≈ 板长，不超过板长 + 1 英尺</text>
  <text x="330" y="86" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C4A882" text-anchor="middle">绳太长→入水后飘回来打头；绳太短→限制活动范围</text>

  <!-- Three board scenarios -->
  <!-- Board 1: Short < 10ft -->
  <g transform="translate(40, 110)">
    <!-- Board top view outline (short board - fish tail) -->
    <path d="M75 10 Q120 8 135 30 Q140 55 135 80 Q120 100 95 105 Q90 115 95 125 Q75 130 55 125 Q60 115 55 105 Q30 100 15 80 Q10 55 15 30 Q30 8 75 10Z" fill="#C4A882" stroke="#7A6145" stroke-width="2"/>
    <text x="75" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#2E2118" text-anchor="middle">短板</text>
    <text x="75" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#2E2118" text-anchor="middle">&lt; 10 ft</text>
    <!-- Arrow down -->
    <line x1="75" y1="135" x2="75" y2="165" stroke="#7A6145" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- Leash indicator -->
    <rect x="20" y="170" width="110" height="44" rx="5" fill="#EDE5D8" stroke="#C4A882" stroke-width="1.5"/>
    <text x="75" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0E6655" text-anchor="middle">9 ft 踝绳</text>
    <text x="75" y="207" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7A6145" text-anchor="middle">约 274cm</text>
  </g>

  <!-- Board 2: Standard 10-12ft -->
  <g transform="translate(250, 110)">
    <!-- Board top view outline (standard - round nose) -->
    <path d="M80 8 Q130 10 150 40 Q158 65 150 95 Q130 118 80 122 Q30 118 10 95 Q2 65 10 40 Q30 10 80 8Z" fill="#C4A882" stroke="#7A6145" stroke-width="2"/>
    <text x="80" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#2E2118" text-anchor="middle">标准板</text>
    <text x="80" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#2E2118" text-anchor="middle">10–12 ft</text>
    <!-- Arrow down -->
    <line x1="80" y1="130" x2="80" y2="165" stroke="#7A6145" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- Leash indicator -->
    <rect x="20" y="170" width="120" height="44" rx="5" fill="#EDE5D8" stroke="#C4A882" stroke-width="1.5"/>
    <text x="80" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0E6655" text-anchor="middle">10–11 ft 踝绳</text>
    <text x="80" y="207" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7A6145" text-anchor="middle">约 305–335cm</text>
  </g>

  <!-- Board 3: Long > 12ft -->
  <g transform="translate(465, 110)">
    <!-- Board top view outline (long board - pointed) -->
    <path d="M75 5 Q115 12 130 45 Q135 70 130 100 Q115 118 75 122 Q35 118 20 100 Q15 70 20 45 Q35 12 75 5Z" fill="#C4A882" stroke="#7A6145" stroke-width="2"/>
    <text x="75" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#2E2118" text-anchor="middle">长板</text>
    <text x="75" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#2E2118" text-anchor="middle">&gt; 12 ft</text>
    <!-- Arrow down -->
    <line x1="75" y1="130" x2="75" y2="165" stroke="#7A6145" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- Leash indicator -->
    <rect x="15" y="170" width="120" height="44" rx="5" fill="#EDE5D8" stroke="#C4A882" stroke-width="1.5"/>
    <text x="75" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0E6655" text-anchor="middle">12 ft 踝绳</text>
    <text x="75" y="207" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7A6145" text-anchor="middle">约 366cm</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7A6145"/>
    </marker>
  </defs>

  <!-- Warning boxes bottom -->
  <g transform="translate(40, 330)">
    <rect x="0" y="0" width="268" height="52" rx="5" fill="#FFF3CD" stroke="#C0392B" stroke-width="1.5"/>
    <text x="14" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#C0392B">⚠ 绳太长的危险</text>
    <text x="14" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2E2118">落水后板飘回来速度快，可能打头</text>
  </g>
  <g transform="translate(352, 330)">
    <rect x="0" y="0" width="268" height="52" rx="5" fill="#FFF3CD" stroke="#C0392B" stroke-width="1.5"/>
    <text x="14" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#C0392B">⚠ 绳太短的问题</text>
    <text x="14" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2E2118">落水后限制游泳距离，难以上板</text>
  </g>
</svg>